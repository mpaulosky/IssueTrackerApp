name: Milestone Blog Brief

on:
  milestone:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  create-blog-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Collect milestone issues
        id: issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MILESTONE_NUMBER: ${{ github.event.milestone.number }}
          MILESTONE_TITLE: ${{ github.event.milestone.title }}
          MILESTONE_DESCRIPTION: ${{ github.event.milestone.description }}
          CLOSED_AT: ${{ github.event.milestone.closed_at }}
        run: |
          ISSUES=$(gh api \
            "repos/${{ github.repository }}/issues?milestone=${MILESTONE_NUMBER}&state=closed&per_page=100" \
            --jq '[.[] | "- #\(.number) \(.title) (@\(.user.login))"] | join("\n")')

          ISSUE_COUNT=$(gh api \
            "repos/${{ github.repository }}/issues?milestone=${MILESTONE_NUMBER}&state=closed&per_page=100" \
            --jq 'length')

          echo "issues<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "count=$ISSUE_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create Bilbo blog brief issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MILESTONE_TITLE: ${{ github.event.milestone.title }}
          MILESTONE_NUMBER: ${{ github.event.milestone.number }}
          CLOSED_AT: ${{ github.event.milestone.closed_at }}
          ISSUE_COUNT: ${{ steps.issues.outputs.count }}
          ISSUES_LIST: ${{ steps.issues.outputs.issues }}
        run: |
          PUBLISH_DATE=$(date -d "${CLOSED_AT}" '+%Y-%m-%d' 2>/dev/null || date '+%Y-%m-%d')
          SLUG=$(echo "${MILESTONE_TITLE}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')

          BODY="## Blog Post Brief: ${MILESTONE_TITLE}

Bilbo, please write a dev blog post recapping the **${MILESTONE_TITLE}** milestone.

### Post metadata
- **Suggested filename:** \`docs/blog/${PUBLISH_DATE}-${SLUG}.md\`
- **Suggested publish date:** ${PUBLISH_DATE}
- **Milestone:** [#${MILESTONE_NUMBER}](https://github.com/${{ github.repository }}/milestone/${MILESTONE_NUMBER})

### Closed issues (${ISSUE_COUNT} total)
${ISSUES_LIST}

### Suggested post structure
1. What was this milestone about? (1–2 sentences)
2. Key features and fixes shipped
3. Technical highlights worth explaining in depth (architecture decisions, tricky bugs, patterns introduced)
4. What's coming next

### Instructions
- Write the post to \`docs/blog/${PUBLISH_DATE}-${SLUG}.md\`
- Update \`docs/blog/index.md\` to add the new post to the Recent Posts table
- Follow existing post style (see \`docs/blog/2026-03-27-apphost-aspire-playwright-e2e-tests.md\`)
- Open a PR targeting \`main\` when complete"

          gh issue create \
            --title "Blog post: ${MILESTONE_TITLE} — milestone recap" \
            --body "$BODY" \
            --label "squad:bilbo"
