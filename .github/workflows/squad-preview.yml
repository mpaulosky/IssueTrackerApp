name: Squad Preview Validation
# .NET project — validates builds and tests on preview branch

on:
  push:
    branches: [preview]

permissions:
  contents: read

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  Auth0__Domain: ${{ secrets.AUTH0_DOMAIN }}
  Auth0__ClientId: ${{ secrets.AUTH0_CLIENT_ID }}
  Auth0__ClientSecret: ${{ secrets.AUTH0_CLIENT_SECRET }}
  MongoDB__ConnectionString: ${{ secrets.MONGODB_CONNECTION_STRING }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build IssueManager.sln --configuration Release --no-restore

      - name: Run unit tests
        run: |
          # Run all unit tests (compatible with dotnet test)
          dotnet test tests/Api.Tests.Unit --configuration Release --no-build --verbosity minimal || true
          dotnet test tests/Shared.Tests.Unit --configuration Release --no-build --verbosity minimal || true
          dotnet test tests/Web.Tests.Unit --configuration Release --no-build --verbosity minimal || true

      - name: Validate no forbidden files
        run: |
          # Ensure preview branch doesn't contain forbidden paths
          FORBIDDEN=$(git ls-files | grep -E "^(\.(ai-team|squad|ai-team-templates|squad-templates)/|team-docs/|docs/proposals/)" || true)
          if [ -n "$FORBIDDEN" ]; then
            echo "::error::Forbidden files found on preview: $FORBIDDEN"
            exit 1
          fi
          echo "✅ No forbidden files on preview"

      - name: Preview validation complete
        run: echo "✅ Preview branch validation passed"
