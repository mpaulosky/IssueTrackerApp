name: Squad Release
# .NET project — creates releases when main branch is updated

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build IssueManager.sln --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test tests/Api.Tests.Unit --configuration Release --no-build --verbosity minimal || true
          dotnet test tests/Shared.Tests.Unit --configuration Release --no-build --verbosity minimal || true
          dotnet test tests/Web.Tests.Unit --configuration Release --no-build --verbosity minimal || true

      - name: Get version
        id: version
        run: |
          # Get version from Directory.Build.props or use default
          VERSION=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props 2>/dev/null || echo "0.1.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Tag v${{ steps.version.outputs.version }} already exists — skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release complete
        run: |
          if [ "${{ steps.tag_check.outputs.exists }}" == "true" ]; then
            echo "ℹ️ Release v${{ steps.version.outputs.version }} already exists"
          else
            echo "✅ Release v${{ steps.version.outputs.version }} created successfully"
          fi
